name: CI/CD – AplicacioTaxis

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# Permisos necesarios para que dorny/test-reporter pueda crear Check Runs
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ── 2. JDK ───────────────────────────────────────────────────
      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # ── 3. Build + Tests + Cobertura ─────────────────────────────
      #   Se usa "verify" para que JaCoCo ejecute el check-coverage
      #   definido en el pom.xml (execution id=check-coverage, phase=verify)
      #   NO se llama jacoco:check como goal directo para evitar el error
      #   "parameters 'rules' missing"
      - name: Build, Tests y cobertura JaCoCo
        run: mvn --no-transfer-progress verify
        env:
          MAVEN_OPTS: >-
            -Dnet.bytebuddy.experimental=true

      # ── 4. Publicar resultados de tests ──────────────────────────
      - name: Publicar resultados JUnit
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Tests JUnit 5 (Java 21)
          path: target/surefire-reports/TEST-*.xml
          reporter: java-junit
          fail-on-error: false

      # ── 5. Publicar reporte JaCoCo como artefacto ─────────────────
      - name: Subir reporte JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 14